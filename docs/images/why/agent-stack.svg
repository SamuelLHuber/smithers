<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="360" fill="#0b0f14"/>
  <text x="380" y="36" fill="#e6edf3" font-size="20" font-weight="700" text-anchor="middle">The agent stack</text>

  <!-- Model layer: stateless calls -->
  <rect x="80" y="56" width="600" height="62" rx="10" fill="#3a1418" stroke="#f85149" stroke-width="1.5"/>
  <text x="104" y="83" fill="#f85149" font-size="16" font-weight="700">MODEL LAYER</text>
  <text x="104" y="104" fill="#8b949e" font-size="12.5">GPT · Claude · Gemini · Kimi</text>
  <text x="656" y="94" fill="#f85149" font-size="13" text-anchor="end" font-weight="600">stateless calls</text>

  <!-- Harness layer: context-window management -->
  <rect x="80" y="128" width="600" height="62" rx="10" fill="#3a2410" stroke="#f0883e" stroke-width="1.5"/>
  <text x="104" y="155" fill="#f0883e" font-size="16" font-weight="700">HARNESS LAYER</text>
  <text x="104" y="176" fill="#8b949e" font-size="12.5">Claude Code · Codex · Pi · opencode</text>
  <text x="656" y="166" fill="#f0883e" font-size="13" text-anchor="end" font-weight="600">context-window management</text>

  <!-- Topology layer: orchestration patterns -->
  <rect x="80" y="200" width="600" height="62" rx="10" fill="#3a2c10" stroke="#d29922" stroke-width="1.5"/>
  <text x="104" y="227" fill="#d29922" font-size="16" font-weight="700">TOPOLOGY LAYER</text>
  <text x="104" y="248" fill="#8b949e" font-size="12.5">ReAct · crew · swarm · plan-execute · fan-out</text>
  <text x="656" y="238" fill="#d29922" font-size="13" text-anchor="end" font-weight="600">orchestration patterns</text>

  <!-- Orchestration layer: Smithers -->
  <rect x="80" y="272" width="600" height="70" rx="10" fill="#0f2e1a" stroke="#3fb950" stroke-width="2"/>
  <text x="104" y="303" fill="#3fb950" font-size="16" font-weight="700">ORCHESTRATION LAYER</text>
  <text x="104" y="324" fill="#adbac7" font-size="12.5">humans · code · harnesses → durable workflows</text>
  <text x="656" y="313" fill="#3fb950" font-size="13" text-anchor="end" font-weight="700">this is Smithers</text>
</svg>
