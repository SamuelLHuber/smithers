                            - codex
                            - gemini
                            - kimi
                            - anthropic-api
                            - openai-api
                            - gemini-api
                          description: "Provider id, one of the fixed `smithers agents` catalog."
                        configDir:
                          type:
                            - string
                            - "null"
                          description: "Per-account CLI config dir for subscription providers (null for api-key accounts)."
                        hasConfigDir:
                          type: boolean
                          description: "True when a subscription account has a non-empty config dir."
                        hasApiKey:
