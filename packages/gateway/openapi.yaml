  /v1/rpc/hijackRun:
    post:
      operationId: hijackRun
      summary: "Hijack Run"
      description: "Create an elevated operator handoff session for a run."
      tags:
        - "Gateway RPC"
      security:
        - 
          bearerAuth:
            - run:admin
      x-smithers-api-version: v1
      x-smithers-maturity: stable
      x-smithers-transport: "http+websocket"
      x-smithers-required-scope: run:admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
                - params
              additionalProperties: false
              properties:
                id:
                  type: string
                  description: "Optional caller request id."
                method:
                  const: hijackRun
                params:
                  type: object
                  properties:
                    runId:
                      type: string
                      description: "Stable run identifier."
                    options:
                      type: object
                      description: "Hijack options."
                      properties: {}
                      required: []
                      additionalProperties: true
                  required:
                    - runId
                  additionalProperties: false
            example:
              id: hijackRun-1
              method: hijackRun
              params:
                runId: run_01
                options:
                  reason: "operator takeover"
      responses:
        200:
          description: "Hijack Run response."
          headers:
