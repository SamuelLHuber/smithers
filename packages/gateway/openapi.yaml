components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "short-lived Smithers token"
      description: "Short-lived bearer token issued by smithers token issue."
  schemas:
    GatewayScope:
      type: string
      enum:
        - run:read
        - run:write
        - run:admin
        - approval:submit
        - signal:submit
        - cron:read
        - cron:write
        - account:read
        - memory:read
        - prompt:read
        - score:read
        - ticket:read
        - ticket:write
        - observability:read
      description: "run:read: Read run state, summaries, event streams, node output, and node diffs.\nrun:write: Launch, resume, and cancel runs.\nrun:admin: Perform elevated run control such as hijack and rewind.\napproval:submit: Submit approval decisions.\nsignal:submit: Submit workflow signals.\ncron:read: List cron schedules.\ncron:write: Create, delete, and trigger cron schedules.\naccount:read: List registered agent accounts (API keys redacted).\nmemory:read: List cross-run memory facts.\nprompt:read: List registered prompts.\nscore:read: List scorer/eval results for a run.\nticket:read: List work docs (tickets/plans/specs/proposals).\nticket:write: Create, update, and soft-delete work docs.\nobservability:read: Read DevTools and other observability streams."
    GatewayRpcErrorCode:
      type: string
      enum:
        - InvalidRequest
        - InvalidInput
        - Unauthorized
        - Forbidden
        - RunNotFound
        - RUN_NOT_ACTIVE
        - CronNotFound
        - TicketNotFound
        - NodeNotFound
        - IterationNotFound
        - NodeHasNoOutput
        - FrameOutOfRange
        - SeqOutOfRange
        - Busy
        - AlreadyDecided
        - RateLimited
        - PayloadTooLarge
        - BackpressureDisconnect
        - UnsupportedSandbox
        - VcsError
        - RewindFailed
        - Internal
    JsonValue:
      description: "Any JSON value."
