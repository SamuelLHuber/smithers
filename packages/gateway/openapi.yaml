              properties:
                id:
                  type: string
                  description: "Optional caller request id."
                method:
                  const: launchRun
                params:
                  type: object
                  properties:
                    workflow:
                      type: string
                      description: "Registered Gateway workflow key."
                    input:
                      type: object
                      description: "Workflow input."
                      properties: {}
                      required: []
                      additionalProperties: true
                    options:
                      type: object
                      description: "Launch options."
                      properties:
                        runId:
                          type: string
                          description: "Optional caller-supplied run id."
                        idempotencyKey:
                          type: string
