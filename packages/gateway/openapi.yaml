  /v1/rpc/listAccounts:
    post:
      operationId: listAccounts
      summary: "List Accounts"
      description: "List the registered Smithers agent accounts — the entries in the user-level `~/.smithers/accounts.json` registry that the `smithers agents` CLI manages. Each account's raw API key is redacted; `hasApiKey`/`hasConfigDir` report its auth posture instead."
      tags:
        - "Gateway RPC"
      security:
        -
          bearerAuth:
            - account:read
      x-smithers-api-version: v1
      x-smithers-maturity: stable
      x-smithers-transport: "http+websocket"
      x-smithers-required-scope: account:read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
                - params
              additionalProperties: false
              properties:
                id:
                  type: string
                  description: "Optional caller request id."
