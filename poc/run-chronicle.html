<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smithers — Run Chronicle</title>
<style>
:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-surface2: #1c2128;
  --bg-hover: #21262d;
  --border: #30363d;
  --border-subtle: #21262d;
  --text: #e6edf3;
  --text-secondary: #c9d1d9;
  --text-muted: #8b949e;
  --text-dim: #6e7681;

  --accent: #58a6ff;
  --success: #3fb950;
  --danger: #f85149;
  --warning: #d29922;
  --purple: #a371f7;
  --pink: #d2a8ff;

  --diff-add-bg: rgba(46,160,67,0.15);
  --diff-add-fg: #7ee787;
  --diff-del-bg: rgba(248,81,73,0.15);
  --diff-del-fg: #ffa198;
  --diff-hunk-bg: rgba(56,139,253,0.1);
  --diff-hunk-fg: #79c0ff;

  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 13px; line-height: 1.5; }

.app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }

/* ===== HEADER ===== */
.header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
.run-status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; font-family: var(--font-mono); text-transform: uppercase; cursor: pointer; position: relative; }
.run-status-pill.finished { background: rgba(63,185,80,0.15); color: var(--success); }
.run-status-pill.running { background: rgba(88,166,255,0.15); color: var(--accent); }
.run-status-pill .pulse { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.header-workflow { font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer; text-decoration: underline; text-decoration-color: transparent; }
.header-workflow:hover { text-decoration-color: var(--accent); }
.header-run-id { font-size: 11px; font-family: var(--font-mono); color: var(--text-dim); cursor: pointer; }
.header-run-id:hover { color: var(--text-muted); }
.header-elapsed { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-left: auto; }
.heartbeat { width: 8px; height: 8px; border-radius: 50%; }
.heartbeat.green { background: var(--success); box-shadow: 0 0 4px var(--success); }
.heartbeat.amber { background: var(--warning); }
.heartbeat.red { background: var(--danger); }

/* ===== MAIN ===== */
.main { display: grid; grid-template-columns: 320px 1fr 420px; overflow: hidden; }

/* ===== TREE PANE ===== */
.tree-pane { background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.tree-search { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--bg-surface2); border-bottom: 1px solid var(--border); }
.tree-search input { background: transparent; border: none; color: var(--text); font-size: 12px; outline: none; flex: 1; }
.tree-search input::placeholder { color: var(--text-dim); }
.tree-search-icon { color: var(--text-dim); font-size: 11px; }

.tree-content { flex: 1; overflow-y: auto; padding: 4px 0; }
.tree-content::-webkit-scrollbar { width: 5px; }
.tree-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tree-row { display: flex; align-items: center; gap: 4px; padding: 2px 8px; cursor: pointer; position: relative; min-height: 24px; }
.tree-row:hover { background: var(--bg-hover); }
.tree-row.selected { background: rgba(88,166,255,0.1); }
.tree-row.ghost { opacity: 0.4; }
.tree-row .running-cursor { position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent); animation: pulse-bar 2s ease-in-out infinite; }
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.4} }

.tree-chevron { width: 12px; text-align: center; font-size: 9px; color: var(--text-dim); cursor: pointer; flex-shrink: 0; }
.tree-tag { font-size: 11px; font-family: var(--font-mono); font-weight: 500; }
.tree-tag.workflow { color: var(--accent); }
.tree-tag.sequence { color: var(--purple); }
.tree-tag.parallel { color: var(--pink); }
.tree-tag.loop { color: var(--warning); }
.tree-tag.task { color: var(--text); }
.tree-tag.ghost-tag { color: var(--text-dim); }

.tree-name { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); margin-left: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-state { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: auto; flex-shrink: 0; text-transform: uppercase; }
.tree-state.running { background: rgba(88,166,255,0.15); color: var(--accent); }
.tree-state.succeeded { background: rgba(63,185,80,0.12); color: var(--success); }
.tree-state.failed { background: rgba(248,81,73,0.12); color: var(--danger); }
.tree-state.pending { background: rgba(110,118,129,0.12); color: var(--text-dim); }
.tree-state.waiting { background: rgba(163,113,247,0.12); color: var(--purple); }

.tree-lastlog { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); padding-left: 24px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== CHRONICLE (center) ===== */
.chronicle-pane { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
.chronicle-filter { display: flex; gap: 4px; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
.filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 8px; border-radius: 12px; font-size: 10px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active { background: rgba(88,166,255,0.1); border-color: var(--accent); color: var(--accent); }

.chronicle-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }
.chronicle-scroll::-webkit-scrollbar { width: 5px; }
.chronicle-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.ev-row { display: grid; grid-template-columns: 42px 4px 1fr; gap: 0 8px; padding: 4px 12px; cursor: pointer; transition: background 0.1s; }
.ev-row:hover { background: var(--bg-hover); }
.ev-row.selected { background: var(--bg-surface2); }
.ev-seq { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); text-align: right; padding-top: 2px; }
.ev-rail { width: 4px; border-radius: 2px; }
.ev-rail.running { background: var(--accent); }
.ev-rail.success { background: var(--success); }
.ev-rail.failed { background: var(--danger); }
.ev-rail.retrying { background: var(--warning); }
.ev-rail.frame { background: var(--text-dim); opacity: 0.4; }
.ev-rail.approval { background: var(--pink); }
.ev-main { display: flex; align-items: baseline; gap: 5px; min-width: 0; }
.ev-icon { font-size: 10px; flex-shrink: 0; }
.ev-icon.s { color: var(--success); }
.ev-icon.r { color: var(--accent); }
.ev-icon.f { color: var(--danger); }
.ev-icon.w { color: var(--warning); }
.ev-icon.d { color: var(--text-dim); }
.ev-type { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); min-width: 110px; }
.ev-summary { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ev-offset { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-left: auto; flex-shrink: 0; }
.ev-detail { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); padding-left: 18px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== INSPECTOR ===== */
.inspector { background: var(--bg-surface); display: flex; flex-direction: column; overflow: hidden; }
.insp-header { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.insp-node-row { display: flex; align-items: center; gap: 8px; }
.insp-node-tag { font-size: 13px; font-weight: 700; font-family: var(--font-mono); }
.insp-state { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
.insp-state.succeeded { background: rgba(63,185,80,0.12); color: var(--success); }
.insp-state.running { background: rgba(88,166,255,0.12); color: var(--accent); }
.insp-state.failed { background: rgba(248,81,73,0.12); color: var(--danger); }
.insp-sub { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
.insp-sub .copy-btn { cursor: pointer; opacity: 0.5; }
.insp-sub .copy-btn:hover { opacity: 1; }

.insp-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 14px; }
.insp-tab { padding: 7px 10px; font-size: 11px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; font-weight: 500; }
.insp-tab:hover { color: var(--text); }
.insp-tab.active { color: var(--text); border-bottom-color: var(--accent); }

.insp-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
.insp-body::-webkit-scrollbar { width: 5px; }
.insp-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.insp-section { margin-bottom: 14px; }
.insp-section-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 5px; }

/* Props table */
.prop-row { display: flex; align-items: flex-start; gap: 8px; padding: 2px 0; font-size: 11px; }
.prop-key { font-family: var(--font-mono); color: var(--purple); font-weight: 500; min-width: 80px; flex-shrink: 0; }
.prop-val { font-family: var(--font-mono); color: var(--text-muted); word-break: break-all; }

/* Output renderer */
.output-field { padding: 6px 8px; background: var(--bg); border-radius: 4px; margin-bottom: 4px; }
.output-field-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.output-field-name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text); }
.output-field-type { font-size: 9px; padding: 0 4px; border-radius: 2px; background: var(--bg-hover); color: var(--text-dim); font-family: var(--font-mono); }
.output-field-value { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: pre-wrap; line-height: 1.5; }

/* Diff view */
.diff-file-header { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); padding: 4px 8px; background: var(--bg-surface2); border-radius: 4px 4px 0 0; margin-bottom: 0; font-weight: 500; }
.diff-hunk-header { font-family: var(--font-mono); font-size: 10px; color: var(--diff-hunk-fg); background: var(--diff-hunk-bg); padding: 2px 8px; }
.diff-line { font-family: var(--font-mono); font-size: 11px; padding: 1px 8px; display: flex; gap: 0; }
.diff-line .ln { width: 28px; text-align: right; color: var(--text-dim); font-size: 10px; flex-shrink: 0; padding-right: 6px; user-select: none; }
.diff-line .prefix { width: 12px; flex-shrink: 0; font-weight: 700; }
.diff-line.add { background: var(--diff-add-bg); color: var(--diff-add-fg); }
.diff-line.del { background: var(--diff-del-bg); color: var(--diff-del-fg); }
.diff-line.ctx { color: var(--text-muted); }

/* Tool calls in inspector */
.tool-row { display: grid; grid-template-columns: 14px 44px 1fr 36px; align-items: center; gap: 4px; padding: 3px 6px; background: var(--bg); border-radius: 3px; margin-bottom: 2px; font-family: var(--font-mono); font-size: 10px; }
.tool-icon { text-align: center; }
.tool-icon.ok { color: var(--success); }
.tool-name { color: var(--text-muted); font-weight: 500; }
.tool-detail { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-dur { color: var(--text-dim); text-align: right; }

/* Actions */
.insp-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.act-btn { display: flex; align-items: center; gap: 3px; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 10px; cursor: pointer; }
.act-btn:hover { border-color: var(--text-muted); color: var(--text); }
.act-btn.danger { border-color: rgba(248,81,73,0.3); color: var(--danger); }
.act-btn.danger:hover { background: rgba(248,81,73,0.1); }

/* Empty state */
.insp-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); }
.insp-empty-icon { font-size: 24px; opacity: 0.4; margin-bottom: 8px; }

/* ===== FRAME SCRUBBER ===== */
.scrubber { background: var(--bg-surface2); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
.scrubber-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); white-space: nowrap; }
.scrubber-slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
.scrubber-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.scrubber-ticks { display: flex; justify-content: space-between; flex: 1; height: 4px; position: relative; }
.scrubber-tick { width: 1px; height: 4px; background: var(--border); }
.scrubber-rewind { font-size: 10px; font-weight: 600; color: var(--danger); background: rgba(248,81,73,0.12); padding: 3px 8px; border-radius: 4px; border: none; cursor: pointer; display: none; }
.scrubber-rewind.visible { display: block; }
.scrubber-live { font-size: 10px; font-weight: 500; color: var(--accent); cursor: pointer; display: none; }
.scrubber-live.visible { display: block; }
</style>
</head>

<div class="app">

  </div>

    <!-- Chronicle pane -->

        <div style="font-size:11px;max-width:180px;text-align:center">Select a tree node or event to inspect</div>
      </div>

  </div>

  <!-- Frame Scrubber (matches FrameScrubberView) -->
  <div class="scrubber">
    <span class="scrubber-label" id="scrubber-label">frame 6 / 6</span>
    <input type="range" class="scrubber-slider" id="scrubber-slider" min="0" max="6" value="6" step="1">
    <button class="scrubber-rewind" id="scrubber-rewind">Rewind</button>
    <span class="scrubber-live" id="scrubber-live">Return to live</span>

</div>

// ===== RENDER TREE =====
function renderTree(node, depth=0, parentEl) {
  const el = parentEl || document.getElementById('tree-content');
  const isTask = node.type === 'task';
  const hasKids = node.children && node.children.length > 0;
  const indent = depth * 16;
  const stateClass = node.state || 'pending';
  const tagClass = node.ghost ? 'ghost-tag' : node.type;

  const row = document.createElement('div');
  row.className = `tree-row${node.ghost ? ' ghost' : ''}`;
  row.dataset.nodeId = node.nodeId || '';
  row.dataset.id = node.id;
  row.style.paddingLeft = `${8 + indent}px`;

  let label = isTask ? (node.nodeId || node.label || 'Task') : `<${node.name}>`;
  let nameExtra = '';
  if (node.props?.maxConcurrency) nameExtra += ` max=${node.props.maxConcurrency}`;
  if (node.props?.iteration !== undefined) nameExtra += ` iter=${node.props.iteration}`;
  if (node.iteration !== undefined) nameExtra += ` iter=${node.iteration}`;

  row.innerHTML = `
    ${hasKids ? '<span class="tree-chevron">▾</span>' : '<span class="tree-chevron"></span>'}
    <span class="tree-tag ${tagClass}">${isTask ? '' : '‹'}${isTask ? label : node.name}${isTask ? '' : '›'}</span>
    ${isTask ? '' : `<span class="tree-name">${nameExtra}</span>`}
    ${isTask && node.timing ? `<span class="tree-name">${node.timing}</span>` : ''}
    <span class="tree-state ${stateClass}">${stateClass}</span>
  `;

  row.addEventListener('click', () => {
    document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');
    if (node.nodeId) showInspector(node.nodeId, node);
  });

  el.appendChild(row);

  if (hasKids) {
    node.children.forEach(child => renderTree(child, depth + 1, el));
  }
}

function buildTree() {
  const el = document.getElementById('tree-content');
  el.innerHTML = '';
  renderTree(TREE);
  // Add ghost
  GHOST_NODES.forEach(g => renderTree(g, 3, el));
}

// ===== RENDER CHRONICLE =====
function renderChronicle(events) {
  const el = document.getElementById('chronicle');
  el.innerHTML = events.map(ev => `
    <div class="ev-row" data-node="${ev.node||''}" data-seq="${ev.seq}">
      <span class="ev-seq">#${ev.seq}</span>
      <div class="ev-rail ${ev.rail}"></div>
      <div>
        <div class="ev-main">
          <span class="ev-icon ${ev.ic}">${ev.icon}</span>
          <span class="ev-type">${ev.type}</span>
          <span class="ev-summary">${ev.sum}</span>
          <span class="ev-offset">+${ev.ms < 1000 ? ev.ms+'ms' : ev.ms < 60000 ? (ev.ms/1000).toFixed(1)+'s' : Math.floor(ev.ms/60000)+'m'+(Math.round((ev.ms%60000)/1000))+'s'}</span>
        </div>
        ${ev.det ? `<div class="ev-detail">${ev.det}</div>` : ''}
      </div>
    </div>
  `).join('');

  el.querySelectorAll('.ev-row').forEach(row => {
    row.addEventListener('click', () => {
      el.querySelectorAll('.ev-row').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      const node = row.dataset.node;
      if (node) showInspector(node);
    });
  });
}

// ===== RENDER INSPECTOR =====
function showInspector(nodeId, treeNode) {
  const el = document.getElementById('inspector');
  // Special-case for the rejected review at iter 0
  let data = INSPECTORS[nodeId];
  if (nodeId === 'review-rl-tests' && treeNode?.iteration === 0) data = INSPECTORS['review-rl-tests-rejected'];
  if (!data) {
    el.innerHTML = `<div class="insp-empty"><div class="insp-empty-icon">◎</div><div style="font-size:11px">No detail for ${nodeId}</div></div>`;
    return;
  }

  const tabsHtml = data.tabs.map(t => `<div class="insp-tab${t===data.activeTab?' active':''}" data-tab="${t}">${t}</div>`).join('');
  const propsHtml = Object.entries(data.props).map(([k,v]) => `<div class="prop-row"><span class="prop-key">${k}</span><span class="prop-val">${v}</span></div>`).join('');
  const toolsHtml = data.tools.map(t => `<div class="tool-row"><span class="tool-icon ${t.ok?'ok':''}">✓</span><span class="tool-name">${t.n}</span><span class="tool-detail">${t.d}</span><span class="tool-dur">${t.t}</span></div>`).join('');

  let contentHtml = '';

  if (data.activeTab === 'Output') {
    contentHtml = data.output.fields.map(f => `
      <div class="output-field">
        <div class="output-field-header"><span class="output-field-name">${f.name}</span><span class="output-field-type">${f.type}</span></div>
        <div class="output-field-value">${f.value}</div>
      </div>
    `).join('');
  } else if (data.activeTab === 'Diff' && data.diff) {
    const linesHtml = data.diff.hunks[0].lines.map(l => `<div class="diff-line ${l.k==='add'?'add':l.k==='del'?'del':'ctx'}"><span class="ln">${l.ln||''}</span><span class="prefix">${l.k==='add'?'+':l.k==='del'?'-':' '}</span><span>${l.t}</span></div>`).join('');
    contentHtml = `
      <div class="diff-file-header">${data.diff.file}</div>
      <div class="diff-hunk-header">${data.diff.hunks[0].header}</div>
      ${linesHtml}
    `;
  }

  el.innerHTML = `
    <div class="insp-header">
      <div class="insp-node-row">
        <span class="insp-node-tag">&lt;Task&gt;</span>
        <span class="insp-state ${data.state}">${data.state}</span>
      </div>
      <div class="insp-sub">
        <span>${data.props.nodeId}</span>
        <span class="copy-btn" title="Copy node ID">⎘</span>
        ${data.props.iteration !== undefined ? `<span>iter ${data.props.iteration}</span>` : ''}
        ${data.props.timing ? `<span>${data.props.timing}</span>` : ''}
      </div>
    </div>
    <div class="insp-tabs">${tabsHtml}</div>
    <div class="insp-body">
      <div class="insp-section">
        <div class="insp-section-title">Props</div>
        ${propsHtml}
      </div>
      ${data.tools.length ? `<div class="insp-section"><div class="insp-section-title">Tool Calls (${data.tools.length})</div>${toolsHtml}</div>` : ''}
      <div class="insp-section">
        <div class="insp-section-title">${data.activeTab}</div>
        ${contentHtml}
      </div>
      <div class="insp-section">
        <div class="insp-section-title">Actions</div>
        <div class="insp-actions">
          <button class="act-btn">↻ Retry</button>
          <button class="act-btn">◁ Revert</button>
          <button class="act-btn">⎘ Copy ID</button>
          <button class="act-btn danger">⏪ Rewind here</button>
        </div>
      </div>
    </div>
  `;

  // Tab switching
  el.querySelectorAll('.insp-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      data.activeTab = tab.dataset.tab;
      showInspector(nodeId, treeNode);
    });
  });
}

    rewindBtn.classList.add('visible');

    liveBtn.classList.remove('visible');

});

});

});
