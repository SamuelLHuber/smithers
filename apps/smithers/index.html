<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0b0b0d"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="Smithers — describe what you want to build."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>Smithers</title>
    <script>
      // Resolve the theme before first paint so there's no flash of the wrong
      // mode. The React app keeps data-theme in sync afterwards.
      (function () {
        var LIGHT = "#ffffff";
        var DARK = "#0b0b0d";
        // Mirror the resolved theme onto a single active theme-color meta so the
        // mobile browser chrome matches even when the in-app toggle overrides the
        // OS preference. The media-scoped metas above cover the pre-script paint.
        function syncThemeColor(theme) {
          var meta = document.querySelector(
            'meta[name="theme-color"]:not([media])',
          );
          if (!meta) {
            meta = document.createElement("meta");
            meta.setAttribute("name", "theme-color");
            document.head.appendChild(meta);
          }
          meta.setAttribute("content", theme === "dark" ? DARK : LIGHT);
        }
        try {
          // Resolve the theme from the persisted preferences store
          // ("smithers.prefs" blob, written by zustand persist) before React
          // boots, so there is no flash of the wrong mode.
          var t;
          try {
            t = JSON.parse(localStorage.getItem("smithers.prefs")).state.theme;
          } catch (e) {}
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = t;
          syncThemeColor(t);
          // The React toggle writes data-theme on <html>; follow it so the chrome
          // updates the moment the user switches modes.
          new MutationObserver(function () {
            syncThemeColor(document.documentElement.dataset.theme);
          }).observe(document.documentElement, {
            attributes: true,
            attributeFilter: ["data-theme"],
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
