<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background so a circular safe-zone mask cannot clip the art. -->
  <rect width="512" height="512" fill="#10151f"/>
  <!-- Glyph from icon.svg, scaled to ~60% and re-centered so it sits inside the
       maskable safe zone. Original content centers near (256, 256). -->
  <g transform="translate(256 256) scale(0.6) translate(-256 -256)">
    <circle cx="230" cy="230" r="112" fill="none" stroke="#ffffff" stroke-width="44"/>
    <path d="M310 310l84 84" stroke="#78d7ba" stroke-width="52" stroke-linecap="round"/>
  </g>
</svg>
