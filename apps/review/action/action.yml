name: smithers review
description: Review pull requests with smithers. Zero secrets — the service authenticates your repo via GitHub OIDC, runs the agents on metered inference, and posts the review onto the PR.
author: smithers

inputs:
  service-url:
    description: Base URL of the smithers review service.
    required: false
    default: https://review.jjhub.tech

runs:
  using: composite
  steps:
    - name: Set up bun
      uses: oven-sh/setup-bun@v2.2.0
      with:
        bun-version: 1.3.13

    # working-directory on the bun steps keeps bun away from any bunfig.toml
    # in the workspace checkout (bun reads bunfig from its cwd; a workspace
    # preload would force auto-install of deps that are not installed there).
    - name: Gate the event
      id: gate
      shell: bash
      working-directory: ${{ github.action_path }}/src
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        SMITHERS_ACTION_PATH: ${{ github.action_path }}
      run: bun "$SMITHERS_ACTION_PATH/src/runGate.ts"

    - name: Set up pnpm
      if: steps.gate.outputs.should-run == 'true'
      uses: pnpm/action-setup@v6.0.8
      with:
        version: 10.10.0
        run_install: false

    - name: Set up node
      if: steps.gate.outputs.should-run == 'true'
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 22

    - name: Install smithers dependencies
      if: steps.gate.outputs.should-run == 'true'
      shell: bash
      env:
        SMITHERS_ACTION_PATH: ${{ github.action_path }}
      run: pnpm -C "$SMITHERS_ACTION_PATH/../../.." install --frozen-lockfile

    - name: Install Claude Code CLI
      if: steps.gate.outputs.should-run == 'true' && env.CODEX_AUTH_JSON == ''
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Install Codex CLI
      if: steps.gate.outputs.should-run == 'true' && env.CODEX_AUTH_JSON != ''
      shell: bash
      run: npm install -g @openai/codex

    - name: Check out the user's repository
      if: steps.gate.outputs.should-run == 'true'
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Authenticate and review
      if: steps.gate.outputs.should-run == 'true'
      shell: bash
      working-directory: ${{ github.action_path }}/src
      env:
        SMITHERS_ACTION_PATH: ${{ github.action_path }}
        SMITHERS_REVIEW_SERVICE_URL: ${{ inputs.service-url }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GH_TOKEN: ${{ github.token }}
        # Optional BYO-subscription secrets, passed straight through from the
        # caller's job env. runAction picks the engine from whichever is set;
        # absent, inference goes through the metered proxy.
        CODEX_AUTH_JSON: ${{ env.CODEX_AUTH_JSON }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
      run: bun "$SMITHERS_ACTION_PATH/src/runAction.ts"
