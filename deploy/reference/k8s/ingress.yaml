apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smithers-gateway
  namespace: smithers
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - gateway.example.com
      secretName: smithers-gateway-tls
  rules:
    - host: gateway.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smithers-gateway
                port:
                  name: http
