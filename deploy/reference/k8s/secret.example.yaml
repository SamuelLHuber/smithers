apiVersion: v1
kind: Secret
metadata:
  name: smithers-gateway-tokens
  namespace: smithers
type: Opaque
stringData:
  tokens.json: |
    {
      "tokens": {
        "replace-me": {
          "role": "operator",
          "scopes": ["run:read", "run:write"],
          "userId": "user:operator",
          "expiresAtMs": 4102444800000
        }
      }
    }
