<text font-size="32" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" fill="#9CA3B4"><tspan x="96" y="474">Fixed. The engine now advances ready loops as each loop node</tspan><tspan x="96" y="520">completes. WorkflowDriver processes completions incrementally.</tspan><tspan x="96" y="566">No waiting for unrelated tasks to settle.</tspan></text>

