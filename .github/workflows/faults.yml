name: Faults (per-PR)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  faults:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm --filter @smithers-orchestrator/e2e test:faults
