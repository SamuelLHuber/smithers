name: Faults (nightly soak)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SMITHERS_E2E_SOAK: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm --filter @smithers-orchestrator/e2e test:soak
