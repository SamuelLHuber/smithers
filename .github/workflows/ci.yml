name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:effect

      - run: pnpm check:deps

      - run: pnpm lint

      - run: pnpm -r typecheck

      - run: pnpm --filter ./.smithers typecheck

      - run: pnpm typecheck:examples

      - run: pnpm typecheck:evals

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      # The grep tool shells out to ripgrep (`rg`), which the clean runner image
      # does not ship. Without it packages/smithers file-tool tests spawn-fail
      # with PROCESS_FAILED instead of exercising real search.
      - run: sudo apt-get update && sudo apt-get install -y ripgrep

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      # The examples/ tree (porting rules + worked ports) is otherwise only
      # typechecked; run its bun tests so structural porting rules are gated.
      # The context-handoff render test is the no-mocks anti-rot proof for the
      # Aspects + TryCatchFinally + ContinueAsNew handoff embedded in the
      # context-engineering guide (graph render only, no agent CLIs needed).
      - name: Run examples bun tests
        run: bun test examples/bun-port-smithers/components/porting-rules.test.ts examples/context-handoff/workflow.test.ts

      # Real-PTY TUI e2e (picker / input / approval) driven through zmux. These
      # probes need no agent CLI, so they are safe on the clean CI box. The
      # daemon binary is downloaded from the zmux release; tests skip cleanly
      # when ZMUXD is unset, so this step is the only place they actually run.
      - name: Download zmux daemon (linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v0.1.0 --repo smithersai/zmux -p 'zmuxd-linux-x64' --clobber
          chmod +x zmuxd-linux-x64

      - name: Run TUI zmux PTY e2e
        env:
          ZMUXD: ${{ github.workspace }}/zmuxd-linux-x64
        run: bun test --timeout=120000 apps/cli/tests/tui-zmux.e2e.test.js
