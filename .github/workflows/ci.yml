name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:effect

      - run: pnpm check:deps

      - run: pnpm -r typecheck

      - run: pnpm --filter ./.smithers typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.10.0
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
