name: Test — Smithers Runner (local mode)

# Integration test for the local mode of the shareable runner.
# Uses an existing workflow from this repo's .smithers/workflows/ directory.
#
# Expected behavior:
#   - Workflow loads successfully (shows Smithers is set up correctly)
#   - Fails at agent execution because Claude Code CLI isn't installed in GH Actions
#   - Job result = failure
#
# This validates: checkout → install → build → bun run smithers up → exit handling

on:
  workflow_dispatch:

jobs:
  test-local:
    uses: ./.github/workflows/run-smithers.yml
    with:
      workflow: .smithers/workflows/debug.tsx
      input: '{"prompt": "This is a test run from the GitHub Actions runner."}'
      timeout-minutes: 10
      build-first: true
    secrets: inherit

  report:
    needs: test-local
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Runner test report
        run: |
          echo "=== Smithers Runner (Local Mode) Test Report ==="
          echo "Job result: ${{ needs.test-local.result }}"
          echo ""
          echo "Note: 'failure' is EXPECTED because the debug workflow tries to"
          echo "run an agent and Claude Code isn't installed in Actions."
          echo "If we see 'cancelled' or 'skipped', the runner infra broke."
          echo ""
          if [[ "${{ needs.test-local.result }}" == "failure" ]]; then
            echo "✓ PASS: Runner infrastructure works (loaded, failed at agent step as expected)"
          elif [[ "${{ needs.test-local.result }}" == "success" ]]; then
            echo "✓ PASS: Runner succeeded (agent worked!)"
          else
            echo "✗ FAIL: Unexpected result — ${{ needs.test-local.result }}"
            exit 1
          fi
