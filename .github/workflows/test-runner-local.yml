name: Test — Smithers Runner (local mode)

# Integration test for the local mode of the shareable runner.
# Uses an existing workflow from this repo's .smithers/workflows/ directory.
#
# Expected behavior:
#   - Workflow loads successfully (shows Smithers is set up correctly)
#   - Fails at agent execution because Claude Code CLI isn't installed in GH Actions
#   - Exit code mapping works (status=failed, exit-code=1)
#
# This validates: checkout → install → build → bun run smithers up → exit handling

on:
  workflow_dispatch:

jobs:
  test-local:
    uses: ./.github/workflows/run-smithers.yml
    with:
      workflow: .smithers/workflows/debug.tsx
      input: '{"prompt": "This is a test run from the GitHub Actions runner."}'
      timeout-minutes: 10
      build-first: true
    secrets: inherit

  report:
    needs: test-local
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Runner test report
        run: |
          echo "=== Smithers Runner (Local Mode) Test Report ==="
          echo "Run ID:    ${{ needs.test-local.outputs.run-id }}"
          echo "Status:    ${{ needs.test-local.outputs.status }}"
          echo "Exit Code: ${{ needs.test-local.outputs.exit-code }}"
          echo ""
          echo "Note: Exit code 1 (failed) is EXPECTED because the debug workflow"
          echo "tries to run an agent and Claude Code isn't installed in Actions."
          echo "If we see a different failure, the runner infrastructure broke."
          echo ""
          if [[ "${{ needs.test-local.outputs.exit-code }}" == "1" ]]; then
            echo "✓ PASS: Runner infrastructure works (workflow loaded, failed at agent step as expected)"
          elif [[ "${{ needs.test-local.outputs.exit-code }}" == "" ]]; then
            echo "✗ FAIL: Runner didn't produce an exit-code output"
            exit 1
          else
            echo "⚠ UNEXPECTED: Exit code was ${{ needs.test-local.outputs.exit-code }}"
            echo "  Check the logs for infrastructure failures."
            exit 1
          fi
